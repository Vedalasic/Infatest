{% extends "base.html" %}
{% block title %}Класс {{ classroom.name }}{% endblock %}
{% block content %}
<h2 class="mb-3">{{ classroom.name }}</h2>
<div class="card">
  <div class="card-body">
    <h5>Задания класса</h5>
    <div class="list-group">
      {% for a in assignments %}
        <div class="list-group-item d-flex align-items-center gap-3">
          <div class="flex-grow-1">
            <div class="fw-semibold">{{ a.material_title }}</div>
            <div class="small text-muted">{{ a.assigned_at }}</div>
          </div>
          <div class="d-flex gap-2 ms-auto flex-shrink-0">
            <a class="btn btn-sm btn-outline-secondary"
               href="{{ url_for('material_view', material_id=a.material_id) }}">
              Теория
            </a>
            <a class="btn btn-sm btn-success"
               href="{{ url_for('test', material_id=a.material_id, assignment_id=a.assignment_id) }}">
              Пройти тест
            </a>
          </div>
        </div>
      {% else %}
        <div class="text-muted">Заданий пока нет.</div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
