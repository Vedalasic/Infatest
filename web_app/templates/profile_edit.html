{% extends "base.html" %}
{% block title %}Редактирование профиля{% endblock %}
{% block content %}
<h2 class="mb-3">Редактирование профиля</h2>

<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label" for="first_name">Имя</label>
          <input class="form-control" id="first_name" name="first_name" value="{{ u.first_name }}" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label" for="last_name">Фамилия</label>
          <input class="form-control" id="last_name" name="last_name" value="{{ u.last_name }}" required>
        </div>
      </div>
      <button class="btn btn-primary" type="submit">Сохранить</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('student_profile') if session.get('role') != 'teacher' else url_for('teacher_profile') }}">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
