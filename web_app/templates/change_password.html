{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<h2 class="mb-3">Смена пароля</h2>

<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label" for="old_password">Старый пароль</label>
        <input class="form-control" id="old_password" name="old_password" type="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="new_password">Новый пароль</label>
        <input class="form-control" id="new_password" name="new_password" type="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="confirm_password">Повторите новый пароль</label>
        <input class="form-control" id="confirm_password" name="confirm_password" type="password" required>
      </div>
      <button class="btn btn-primary" type="submit">Обновить пароль</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('student_profile') if session.get('role') != 'teacher' else url_for('teacher_profile') }}">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
