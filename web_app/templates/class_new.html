{% extends "base.html" %}
{% block title %}Создать класс{% endblock %}
{% block content %}
<h2 class="mb-3">Создать класс</h2>
<form method="post" class="card card-body">
  <div class="mb-3">
    <label class="form-label" for="name">Название класса</label>
    <input id="name" name="name" class="form-control" required>
  </div>
  <div>
    <button class="btn btn-primary" type="submit">Создать</button>
    <a class="btn btn-secondary" href="{{ url_for('classes_home') }}">Отмена</a>
  </div>
</form>
{% endblock %}
